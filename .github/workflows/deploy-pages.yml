name: Deploy game to GitHub Pages

on:
  push:
    branches:
      - master
      - preview/build-input-viewport
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      preview-exists: ${{ steps.preview-branch.outputs.exists }}
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: master
          path: source/master

      - name: Check preview branch
        id: preview-branch
        shell: bash
        run: |
          if git -C source/master ls-remote --exit-code origin refs/heads/preview/build-input-viewport > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout preview branch
        if: steps.preview-branch.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: preview/build-input-viewport
          path: source/preview

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source/master/game/package-lock.json

      - name: Install production dependencies
        working-directory: source/master/game
        run: npm ci

      - name: Test production
        working-directory: source/master/game
        run: npm test

      - name: Build production
        working-directory: source/master/game
        run: npm run build

      - name: Install preview dependencies
        if: steps.preview-branch.outputs.exists == 'true'
        working-directory: source/preview/game
        run: npm ci

      - name: Test preview
        if: steps.preview-branch.outputs.exists == 'true'
        working-directory: source/preview/game
        run: npm test

      - name: Build preview
        if: steps.preview-branch.outputs.exists == 'true'
        working-directory: source/preview/game
        env:
          VITE_DEPLOY_CHANNEL: preview-build-input-viewport
        run: npm run build

      - name: Assemble Pages site
        shell: bash
        run: |
          mkdir -p site
          cp -a source/master/game/dist/. site/
          if [[ "${{ steps.preview-branch.outputs.exists }}" == "true" ]]; then
            mkdir -p site/preview/build-input-viewport
            cp -a source/preview/game/dist/. site/preview/build-input-viewport/
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
