<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>危城无双之三国群英</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { display: flex; align-items: center; justify-content: center; touch-action: none; }
    #game-container { position: relative; }
    #game-canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #FCFFCD; font-family: monospace; font-size: 16px; text-align: center; }
    #loading .bar { width: 200px; height: 10px; border: 1px solid #FCFFCD; margin-top: 10px; }
    #loading .fill { height: 100%; background: #FCFFCD; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="loading">
      <div>危城无双之三国群英</div>
      <div style="font-size: 12px; margin-top: 5px;">加载中...</div>
      <div class="bar"><div class="fill" id="loading-fill"></div></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
